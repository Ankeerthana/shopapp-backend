# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/shopapp_db
spring.datasource.username=root
spring.datasource.password=@Keerthana2003
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# SERVER
server.port=8080

# JAVA 21 VIRTUAL THREADS
spring.threads.virtual.enabled=true

# JWT
jwt.secret=shopapp-super-secret-key-minimum-32-characters-long
jwt.expiration=86400000

# EMAIL
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your.email@gmail.com
spring.mail.password=your-16-char-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# RAZORPAY
razorpay.key.id=rzp_test_YOUR_KEY_ID
razorpay.key.secret=YOUR_RAZORPAY_SECRET

# FILE UPLOAD
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/
spring.security.user.name=disabled
spring.security.user.password=disabled
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration